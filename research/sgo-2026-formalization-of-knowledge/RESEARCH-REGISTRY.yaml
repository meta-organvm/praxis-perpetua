program:
  id: SGO-2026-RP-001
  title: "The Formalization of Knowledge: From Social Origins to Logical Foundations"
  principal_investigator: "Sole Practitioner, ORGANVM System"
  institution: "Studium Generale ORGANVM"
  start_date: 2026-03-20
  status: CANDIDATE
  central_thesis: >
    Knowledge becomes formal through a four-phase process -- naming, structuring,
    computing, and reflecting -- that recurs at every level of abstraction.
    This process is subject to fundamental impossibility results (Godel, Tarski,
    Rice, Arrow, Goodhart) that constrain but do not prevent self-governance.


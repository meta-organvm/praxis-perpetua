name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check markdown structure
        run: |
          set -euo pipefail
          echo "=== Checking required directories ==="
          for dir in standards templates sessions lessons; do
            if [ ! -d "$dir" ]; then
              echo "FAIL: Missing required directory: $dir"
              exit 1
            fi
          done
          echo "All required directories present."

          echo "=== Checking required files ==="
          required_files=(
            "README.md"
            "CLAUDE.md"
            "seed.yaml"
            "standards/METADOC--research-standards.md"
            "standards/SOP--session-self-critique.md"
            "standards/SOP--cross-agent-handoff.md"
            "standards/SOP--structural-integrity-audit.md"
            "standards/SOP--market-gap-analysis.md"
            "standards/SOP--research-to-implementation-pipeline.md"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "FAIL: Missing required file: $f"
              exit 1
            fi
          done
          echo "All required files present."

          echo "=== Checking session log naming ==="
          for f in sessions/*.md; do
            [ "$f" = "sessions/*.md" ] && break
            basename="$(basename "$f")"
            if ! echo "$basename" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}--'; then
              echo "FAIL: Session log does not follow YYYY-MM-DD--description.md pattern: $f"
              exit 1
            fi
          done
          echo "All session logs follow naming convention."

      - name: Check for broken internal links (informational)
        run: |
          # Informational only — this is a docs-only repo in a multi-repo workspace.
          # Many links are workspace-relative cross-repo references (../VISION.md,
          # ../../organvm-v-logos/...) or HTML annotation artifacts (start_span, end_span).
          # These are valid locally but unresolvable in CI's single-repo checkout.
          # Hard gates are the structural checks above; link health is advisory.

          mapfile -t md_files < <(find . -name '*.md' \
            -not -path './.git/*' \
            -not -path './content-pipeline/object-lessons/*' \
            -not -path './sessions/claude-artifacts/*' \
            -not -name 'AGENTS.md' \
            -not -name 'GEMINI.md' \
            -not -name 'CLAUDE.md')

          count=0
          for f in "${md_files[@]}"; do
            links=$(grep -oP '\[.*?\]\(\K[^)]+' "$f" 2>/dev/null | grep -v '^http' | grep -v '^#' || true)
            [ -z "$links" ] && continue
            while IFS= read -r link; do
              target_path="${link%%#*}"
              [ -z "$target_path" ] && continue
              # Skip obvious non-path tokens (HTML attributes, template vars, placeholders)
              [[ "$target_path" =~ ^[a-z_]+$ ]] && continue
              [[ "$target_path" =~ ^\{\{ ]] && continue
              [[ "$target_path" =~ ^\.\.\. ]] && continue
              target="$(dirname "$f")/$target_path"
              if [ ! -e "$target" ]; then
                echo "WARN: $f -> $link"
                count=$((count + 1))
              fi
            done <<< "$links"
          done

          if [ "$count" -gt 0 ]; then
            echo "INFO: $count unresolvable links (most are cross-repo workspace references)"
          else
            echo "No broken internal links found."
          fi

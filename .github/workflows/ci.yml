name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check markdown structure
        run: |
          set -euo pipefail
          echo "=== Checking required directories ==="
          for dir in standards templates sessions lessons; do
            if [ ! -d "$dir" ]; then
              echo "FAIL: Missing required directory: $dir"
              exit 1
            fi
          done
          echo "All required directories present."

          echo "=== Checking required files ==="
          required_files=(
            "README.md"
            "CLAUDE.md"
            "seed.yaml"
            "standards/METADOC--research-standards.md"
            "standards/SOP--session-self-critique.md"
            "standards/SOP--cross-agent-handoff.md"
            "standards/SOP--structural-integrity-audit.md"
            "standards/SOP--market-gap-analysis.md"
            "standards/SOP--research-to-implementation-pipeline.md"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "FAIL: Missing required file: $f"
              exit 1
            fi
          done
          echo "All required files present."

          echo "=== Checking session log naming ==="
          for f in sessions/*.md; do
            [ "$f" = "sessions/*.md" ] && break
            basename="$(basename "$f")"
            if ! echo "$basename" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}--'; then
              echo "FAIL: Session log does not follow YYYY-MM-DD--description.md pattern: $f"
              exit 1
            fi
          done
          echo "All session logs follow naming convention."

      - name: Check for broken internal links
        run: |
          set -euo pipefail
          broken=0
          # Auto-generated context files contain workspace-relative cross-repo
          # links (../../organvm-i-theoria/...) that only resolve locally.
          # Exclude them — they are validated by organvm context sync, not CI.
          skip_pattern='^\./\(AGENTS\.md\|GEMINI\.md\|CLAUDE\.md\)$'

          while IFS= read -r f; do
            if echo "$f" | grep -q "$skip_pattern"; then
              continue
            fi
            # Extract relative markdown links (not URLs, not anchors)
            grep -oP '\[.*?\]\(\K[^)]+' "$f" 2>/dev/null | grep -v '^http' | grep -v '^#' | while read -r link; do
              # Strip any anchor fragment from the link target
              target_path="${link%%#*}"
              [ -z "$target_path" ] && continue
              target="$(dirname "$f")/$target_path"
              if [ ! -e "$target" ]; then
                echo "BROKEN: $f -> $link"
                # Signal to parent via temp file (subshell can't set parent vars)
                touch /tmp/ci-broken-links
              fi
            done
          done < <(find . -name '*.md' -not -path './.git/*' -not -path './content-pipeline/object-lessons/*')

          if [ -f /tmp/ci-broken-links ]; then
            echo "FAIL: Broken internal links detected (see above)"
            exit 1
          fi
          echo "No broken internal links found."
